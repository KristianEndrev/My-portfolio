<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Skills</title>
    <link rel="stylesheet" href="css/professional-skills.css">
</head>
<body>
    <main class="skills-page">
        <section class="skills-hero">
            <h1 class="skills-title">Professional Skills</h1>
            <p class="skills-subtitle">
                Documenting growth through meetings, reflections, and continuous learning
            </p>
        </section>

        <section class="skills-categories" id="skillsCategories">

            <button class="skill-category-card" type="button" data-category="minutes">
                <span class="skill-icon-box">
                    <svg class="skill-svg-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                        <path d="M9 5H7a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"></path>
                        <path d="M9 3h6v4H9z"></path>
                        <path d="M9 12h6"></path>
                        <path d="M9 16h4"></path>
                    </svg>
                </span>
                <span class="skill-card-title">Minutes of Meeting</span>
                <span class="skill-card-count">4 documents</span>
            </button>

            <button class="skill-category-card" type="button" data-category="reflection">
                <span class="skill-icon-box">
                    <svg class="skill-svg-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                        <path d="M4 6.5A2.5 2.5 0 0 1 6.5 4H12v16H6.5A2.5 2.5 0 0 0 4 22z"></path>
                        <path d="M20 6.5A2.5 2.5 0 0 0 17.5 4H12v16h5.5A2.5 2.5 0 0 1 20 22z"></path>
                    </svg>
                </span>
                <span class="skill-card-title">Reflection Reports</span>
                <span class="skill-card-count">4 documents</span>
            </button>

            <button class="skill-category-card" type="button" data-category="feedback">
                <span class="skill-icon-box">
                    <svg class="skill-svg-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                        <path d="M21 15a2 2 0 0 1-2 2H8l-5 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                    </svg>
                </span>
                <span class="skill-card-title">Feedback & Reviews</span>
                <span class="skill-card-count">4 documents</span>
            </button>

            <button class="skill-category-card" type="button" data-category="presentations">
                <span class="skill-icon-box">
                    <svg class="skill-svg-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                        <path d="M8 6v12"></path>
                        <path d="M12 10v8"></path>
                        <path d="M16 4v14"></path>
                    </svg>
                </span>
                <span class="skill-card-title">Presentations</span>
                <span class="skill-card-count">4 documents</span>
            </button>

            <button class="skill-category-card" type="button" data-category="training">
                <span class="skill-icon-box">
                    <svg class="skill-svg-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                        <path d="M12 3 4 7l8 4 8-4-8-4z"></path>
                        <path d="M4 12l8 4 8-4"></path>
                        <path d="M4 17l8 4 8-4"></path>
                    </svg>
                </span>
                <span class="skill-card-title">Training & Workshops</span>
                <span class="skill-card-count">4 documents</span>
            </button>

            <button class="skill-category-card" type="button" data-category="certifications">
                <span class="skill-icon-box">
                    <svg class="skill-svg-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                        <circle cx="12" cy="8" r="4"></circle>
                        <path d="M10 12.5 8 21l4-2 4 2-2-8.5"></path>
                    </svg>
                </span>
                <span class="skill-card-title">Certifications</span>
                <span class="skill-card-count">4 documents</span>
            </button>

            <span class="moving-active-dot" id="movingActiveDot"></span>
        </section>

        <p class="skills-helper-text hidden" id="skillsHelperText">
            Select a category above to view your professional documents
        </p>

        <section class="skills-details visible" id="skillsDetails">
            <div class="skills-details-header">
                <div class="skills-details-icon-box">
                    <span class="skills-details-icon" id="detailsIconHolder">
                        <svg class="skill-svg-icon details-svg-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                            <path d="M9 5H7a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"></path>
                            <path d="M9 3h6v4H9z"></path>
                            <path d="M9 12h6"></path>
                            <path d="M9 16h4"></path>
                        </svg>
                    </span>
                </div>

                <div class="skills-details-heading">
                    <h2 id="detailsTitle">Minutes of Meeting</h2>
                    <p id="detailsSubtitle">Browse and access your documents</p>
                </div>
            </div>

            <div class="skills-documents-grid" id="skillsDocumentsGrid"></div>
        </section>
    </main>

    <script src="js/professional-skills.js"></script>
</body>
</html>
